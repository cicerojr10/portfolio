<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | escape }} | {{ site.title | escape }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {%- if site.favicon -%}
    <link rel="icon" href="{{ site.favicon | relative_url }}" type="image/x-icon">
    {%- endif -%}
    {%- if site.google_analytics -%}
      <!-- Google Analytics -->
      <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics | escape }}"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ site.google_analytics | escape }}');
      </script>
    {%- endif -%}
  </head>
  <body>
    <div id="wrapper">
      {% include header.html %}
      <main id="main" tabindex="-1" aria-label="Conteúdo principal">
        {{ content }}
      </main>
      {% include footer.html %}
    </div>
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
