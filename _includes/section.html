{%- assign _title = include.title | default: 'Untitled' -%}
{%- assign _slug = _title | strip_html | slugify | default: 'untitled' -%}
<section id="{{ _slug }}">
  <div class="container">
    <header>
      <h2>{{ _title }}</h2>
      {% if include.subtitle %}<p>{{ include.subtitle }}</p>{% endif %}
    </header>
    {{ include.content }}
  </div>
</section>
