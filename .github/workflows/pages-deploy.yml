name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install dependencies
        run: bundle install

      - name: Build site
        run: |
          bundle exec jekyll build --destination ./_site
        env:
          JEKYLL_ENV: production # É uma boa prática definir isso para builds de produção

      - name: List _site content # Este passo é para debug e pode ser removido depois que funcionar
        run: ls -la ./_site # Lista o conteúdo da pasta _site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
